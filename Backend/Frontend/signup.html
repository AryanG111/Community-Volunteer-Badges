<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Community Volunteer</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .auth-card {
      max-width: 450px;
      margin: 0 auto;
    }
    .register-link {
      text-align: center;
      margin-top: 24px;
      font-size: 0.95rem;
    }
    .register-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .register-link a:hover {
      text-decoration: underline;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .error-text {
      color: var(--error);
      font-size: 0.85rem;
      margin-top: 4px;
      display: none;
    }
    input:invalid:not(:placeholder-shown) {
      border-color: var(--error);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card auth-card">
      <div class="eyebrow">Join the Movement</div>
      <h1>Create Account</h1>
      <p class="subtitle">Start your journey as a volunteer and earn badges for your contributions.</p>
      
      <form id="signup-form" novalidate>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="john@example.com" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="At least 8 characters" required minlength="8">
          <div id="password-error" class="error-text">Password must be at least 8 characters long.</div>
        </div>

        <button type="submit" id="submit-btn" class="register-btn">Sign Up</button>
      </form>

      <div id="message" class="message"></div>

      <div class="register-link">
        Already have an account? <a href="login.html">Login here</a>
      </div>
    </div>
  </div>
  <script src="signup.js"></script>
</body>
</html>
